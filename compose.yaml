name: bamboo-forest

x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bamboo_forest}
      POSTGRES_USER: ${POSTGRES_USER:-bamboo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-50}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-bamboo} -d ${POSTGRES_DB:-bamboo_forest}
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    mem_limit: ${DB_MEMORY_LIMIT:-512m}
    stop_grace_period: 30s
    logging: *default-logging

  backend:
    build:
      context: ./complete
    restart: unless-stopped
    init: true
    environment:
      SPRING_PROFILES_ACTIVE: postgres,prod
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bamboo_forest}
      DB_USERNAME: ${POSTGRES_USER:-bamboo}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_ORIGIN:-http://localhost:8080}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SECURITY_HSTS_ENABLED: ${SECURITY_HSTS_ENABLED:-false}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      POST_IMAGE_UPLOAD_DIR: /data/uploads/post-images
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-2}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      AI_PROVIDER: ${AI_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms256m -Xmx512m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Duser.timezone=Asia/Seoul}
    volumes:
      - post_images:/data/uploads/post-images
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    mem_limit: ${BACKEND_MEMORY_LIMIT:-768m}
    stop_grace_period: 35s
    logging: *default-logging

  frontend:
    build:
      context: ./my-react-app
    restart: unless-stopped
    init: true
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-128m}
    stop_grace_period: 10s
    logging: *default-logging

volumes:
  postgres_data:
  post_images:
