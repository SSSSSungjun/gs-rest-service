server.port=8080

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/ewcom_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=ewcom_user
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cookie.secure=false
app.upload.post-images-dir=uploads/post-images
app.upload.public-path=/uploads/post-images
app.upload.max-image-size=5242880

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.4-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
