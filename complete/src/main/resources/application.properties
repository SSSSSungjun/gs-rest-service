server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/ewcom_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:ewcom_user}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50

springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cookie.secure=${COOKIE_SECURE:false}
app.upload.post-images-dir=uploads/post-images
app.upload.public-path=/uploads/post-images
app.upload.max-image-size=5242880

app.ai.provider=${AI_PROVIDER:gemini}
app.ai.max-output-tokens=${AI_MAX_OUTPUT_TOKENS:8192}

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
app.gemini.thinking-level=${GEMINI_THINKING_LEVEL:medium}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.4-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}