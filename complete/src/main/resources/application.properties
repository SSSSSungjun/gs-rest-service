server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/ewcom_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:ewcom_user}
spring.datasource.password=${DB_PASSWORD:1234}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.flyway.enabled=false

springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cookie.secure=${COOKIE_SECURE:false}
app.security.hsts-enabled=${SECURITY_HSTS_ENABLED:false}
app.upload.post-images-dir=uploads/post-images
app.upload.public-path=/uploads/post-images
app.upload.max-image-size=5242880

app.activity.heartbeat-ms=${ACTIVITY_HEARTBEAT_MS:25000}

app.rate-limit.enabled=${RATE_LIMIT_ENABLED:false}
app.rate-limit.stale-after=${RATE_LIMIT_STALE_AFTER:1h}
app.rate-limit.ai.session-limit=${AI_RATE_LIMIT_PER_SESSION:3}
app.rate-limit.ai.ip-limit=${AI_RATE_LIMIT_PER_IP:10}
app.rate-limit.ai.window=${AI_RATE_LIMIT_WINDOW:10m}
app.rate-limit.ai.max-concurrent=${AI_MAX_CONCURRENT:2}
app.rate-limit.ai.daily-limit=${AI_DAILY_LIMIT:200}
app.rate-limit.content.session-limit=${CONTENT_RATE_LIMIT_PER_SESSION:20}
app.rate-limit.content.ip-limit=${CONTENT_RATE_LIMIT_PER_IP:100}
app.rate-limit.content.window=${CONTENT_RATE_LIMIT_WINDOW:1m}
app.rate-limit.upload.session-limit=${UPLOAD_RATE_LIMIT_PER_SESSION:10}
app.rate-limit.upload.ip-limit=${UPLOAD_RATE_LIMIT_PER_IP:30}
app.rate-limit.upload.window=${UPLOAD_RATE_LIMIT_WINDOW:10m}
app.rate-limit.interaction.session-limit=${INTERACTION_RATE_LIMIT_PER_SESSION:120}
app.rate-limit.interaction.ip-limit=${INTERACTION_RATE_LIMIT_PER_IP:600}
app.rate-limit.interaction.window=${INTERACTION_RATE_LIMIT_WINDOW:1m}

app.ai.provider=${AI_PROVIDER:gemini}
app.ai.max-output-tokens=${AI_MAX_OUTPUT_TOKENS:8192}
app.ai.connect-timeout-ms=${AI_CONNECT_TIMEOUT_MS:5000}
app.ai.read-timeout-ms=${AI_READ_TIMEOUT_MS:90000}

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
app.gemini.thinking-level=${GEMINI_THINKING_LEVEL:medium}
app.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5.4-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
