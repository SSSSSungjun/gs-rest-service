server.port=8080

spring.datasource.url=jdbc:h2:file:./data/daenamu;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui.html

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=55MB

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
app.cookie.secure=false
app.upload.post-images-dir=uploads/post-images
app.upload.public-path=/uploads/post-images
app.upload.max-image-size=5242880
