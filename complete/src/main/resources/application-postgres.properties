spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/bamboo_forest}
spring.datasource.username=${DB_USERNAME:bamboo}
spring.datasource.password=${DB_PASSWORD:bamboo}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/postgresql
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1
