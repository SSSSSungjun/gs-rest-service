name: Refresh frontend lockfile

on:
  push:
    branches:
      - feat/docker-deployment
    paths:
      - 'my-react-app/package.json'
      - '.github/workflows/refresh-frontend-lock.yml'

permissions:
  contents: write

jobs:
  refresh-lock:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-react-app
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: feat/docker-deployment

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Regenerate lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync frontend lockfile"
          git push origin HEAD:feat/docker-deployment
